<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Caffeinated | Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Assets/styles/Auth.css">
    <script src="../Assets/scripts/AuthStatus.js" defer></script>
</head>
<body>
    <main class="auth-shell reverse">
        <section class="auth-panel">
            <div class="auth-card">
                <p class="eyebrow">Create account</p>
                <h2>Start tracking every caffeine run.</h2>
                <p class="form-status" data-auth-status hidden></p>

                <form action="../php/signup.php" method="post">
                    <label for="name">Full name</label>
                    <input id="name" name="name" type="text" maxlength="120" placeholder="Your name" required>

                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" maxlength="160" placeholder="you@example.com" required>

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" minlength="8" placeholder="At least 8 characters" required>

                    <label for="confirm_password">Confirm password</label>
                    <input id="confirm_password" name="confirm_password" type="password" minlength="8" placeholder="Repeat your password" required>

                    <button type="submit">Create account</button>
                </form>

                <p class="switch-link">Already registered? <a href="../Pages/LoginPage.html">Login</a></p>
                <a class="back-link" href="../Pages/Home.html">Back to home</a>
            </div>
        </section>

        <section class="auth-visual">
            <img src="../Assets/Images/About.jpg" alt="Cafe interior">
            <div class="auth-visual-overlay"></div>
            <a href="../Pages/Home.html" class="brand-mark">
                <img src="../Assets/Images/Logo.png" alt="Get Caffeinated logo">
                <div>
                    <h1>Get Caffeinated</h1>
                    <p>Coffee. Focus. Repeat.</p>
                </div>
            </a>
            <div class="auth-copy">
                <p class="eyebrow">Member profile</p>
                <h2>Visits, orders, and favorite moments.</h2>
                <p>Your profile keeps your coffee history in one clean dashboard.</p>
            </div>
        </section>
    </main>
</body>
</html>
