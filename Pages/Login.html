<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Caffeinated - Login</title>
    <link rel="stylesheet" href="../Assets/styles/Login.css">
</head>

<body>
  <div class="container">
    <div class="hero-section">
      <img src="../Assets/Images/Hero.jpg" alt="Coffee Background" class="bg-img">
      <div class="hero-overlay">
        <div class="logo-area">
          <img src="../Assets/Images/Logo.png" alt="Get Caffeinated Logo" class="logo-main">
          <h1>Get Caffeinated</h1>
          <p class="tagline">COFFEE. FOCUS. REPEAT</p>
        </div>
        
        <div class="hero-footer">
          <div class="footer-icon">
            <img src="../Assets/Images/bay-leaf.png" alt="Leaf Icon">
          </div>
          <div class="footer-text">
            <h3>More than just coffee</h3>
            <p>We're here to fuel your day, spark creativity, and bring people together.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-wrapper">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue your coffee journey</p>

        <form action="Login.php" method="POST" id="LoginForm">
          <div class="input-group">
            <label>Email Address</label>
            <div class="input-field">
              <img src="../Assets/Images/email.png" alt="Email Icon" class="icon">
              <input type="email" name="email" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="input-group">
            <label>Password</label>
            <div class="input-field">
              <img src="../Assets/Images/password.png" alt="Password Icon" class="icon">
              <input type="password" name="password" placeholder="Enter your password" required>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-container">
              <input type="checkbox" name="remember">
              <span class="checkmark"></span>
              Remember Me
            </label>

              <a href="#" class="forgot-link">Forgot Password?</a>

          </div>

          <button type="submit" class="btn-login">Login</button>

        </form>

        <button class="btn-google">
          <img src="../Assets/Images/google.png" alt="Google Icon">
          Continue with Google
        </button>

        <p class="signup-text">Don't have an account? <a href="Signup.html">Sign up</a></p>
      </div>
    </div>
  </div>

  <script src="../Assets/scripts/Login.js"></script>
</body>
</html>
