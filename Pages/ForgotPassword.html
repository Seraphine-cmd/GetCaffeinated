<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Caffeinated | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Assets/styles/Auth.css">
    <script src="../Assets/scripts/AuthStatus.js" defer></script>
</head>
<body>
    <main class="auth-shell compact">
        <section class="auth-panel full-panel">
            <div class="auth-card reset-card">
                <a href="../Pages/Home.html" class="brand-mark compact-brand">
                    <img src="../Assets/Images/Logo.png" alt="Get Caffeinated logo">
                    <div>
                        <h1>Get Caffeinated</h1>
                        <p>Coffee. Focus. Repeat.</p>
                    </div>
                </a>

                <p class="eyebrow">Reset password</p>
                <h2>Get back into your profile.</h2>
                <p class="auth-subtitle">Enter your account email and a new password. For production, connect this to an email token flow.</p>
                <p class="form-status" data-auth-status hidden></p>

                <form action="../php/reset_password.php" method="post">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required>

                    <label for="password">New password</label>
                    <input id="password" name="password" type="password" minlength="8" placeholder="At least 8 characters" required>

                    <label for="confirm_password">Confirm new password</label>
                    <input id="confirm_password" name="confirm_password" type="password" minlength="8" placeholder="Repeat new password" required>

                    <button type="submit">Reset password</button>
                </form>

                <p class="switch-link">Remembered it? <a href="../Pages/LoginPage.html">Login</a></p>
            </div>
        </section>
    </main>
</body>
</html>
