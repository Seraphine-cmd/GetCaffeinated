<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Caffeinated | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Assets/styles/Auth.css">
    <script src="../Assets/scripts/AuthStatus.js" defer></script>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-visual">
            <img src="../Assets/Images/Hero.jpg" alt="Coffee background">
            <div class="auth-visual-overlay"></div>
            <a href="../Pages/Home.html" class="brand-mark">
                <img src="../Assets/Images/Logo.png" alt="Get Caffeinated logo">
                <div>
                    <h1>Get Caffeinated</h1>
                    <p>Coffee. Focus. Repeat.</p>
                </div>
            </a>
            <div class="auth-copy">
                <p class="eyebrow">Welcome back</p>
                <h2>Your coffee streak is waiting.</h2>
                <p>Sign in to track visits, order history, and your Get Caffeinated activity.</p>
            </div>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <p class="eyebrow">Login</p>
                <h2>Continue your cafe journey.</h2>
                <p class="form-status" data-auth-status hidden></p>

                <form action="../php/login.php" method="post">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required>

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter your password" required>

                    <div class="form-row">
                        <label class="inline-check"><input type="checkbox" name="remember"> Remember me</label>
                        <a href="../Pages/ForgotPassword.html">Forgot password?</a>
                    </div>

                    <button type="submit">Login</button>
                </form>

                <p class="switch-link">No account yet? <a href="../Pages/Signup.html">Create one</a></p>
                <a class="back-link" href="../Pages/Home.html">Back to home</a>
            </div>
        </section>
    </main>
</body>
</html>
